<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="nombre">Tipo texto</label> <!--Sirve para validar de lo que se ingresa sea de tipo texto-->
    <input type="text" id="nombre"> 
    <label for="email">Tipo Email</label> <!--Sirve para validad lo que se ingresa como tipo email-->
    <input type="email" id="email">
    <label for="password">Tipo Password</label> <!--Sirve para ocultar lo que se ingresa (contraseñas)-->
    <input type="password" id="password">
    <label for="number">Tipo number</label> <!--sirve para ingfresar solo numeros, no permite escribir letras-->
    <input type="number" name="" id="number">
    <label for="checkbox">Tipo CheckBox</label><!--es una casilla para tildar-->
    <input type="checkbox" name="" id="checkbox">
    <label for="radio">Tipo Radio</label> <!--Es un boton circular, el cual en general se usa pra preguntas-->
    <label for="date">Tipo date</label><!--es para elegir una fecha-->
    <input type="date" name="" id="date">
    <label for="submit">tipo submit</label><!--sirve para enviar un formulario-->
    <input type="submit" value="submit">
</body>
</html>
